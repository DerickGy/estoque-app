<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão de Estoque</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>Gestão de Estoque</h1>
    </header>

    <div class="tabs">
      <button class="tab active" onclick="showTab('estoque', this)">Estoque</button>
      <button class="tab" onclick="showTab('cadastro', this)">Cadastrar produto</button>
      <button class="tab" onclick="showTab('venda', this)">Registrar venda</button>
    </div>

    <!-- ESTOQUE -->
    <div id="tab-estoque" class="section active">
      <div class="card">
        <div class="section-title">Produtos em estoque</div>
        <div id="stock-empty" class="empty">Nenhum produto cadastrado ainda.</div>
        <table class="stock-table" id="stock-table" style="display:none">
          <thead>
            <tr>
              <th>Modelo</th>
              <th>Cor</th>
              <th>Nº</th>
              <th>Qtd</th>
              <th>Custo</th>
              <th>Venda</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="stock-body"></tbody>
        </table>
      </div>
    </div>

    <!-- CADASTRO -->
    <div id="tab-cadastro" class="section">
      <div class="card">
        <div class="section-title">Novo produto</div>
        <div id="msg-cadastro" class="msg"></div>

        <div class="field full" style="margin-bottom:12px">
          <label>Modelo / nome do tênis</label>
          <div class="autocomplete-wrap">
            <input type="text" id="f-modelo" placeholder="Ex: Nike Air Max 90" autocomplete="off" oninput="onModeloInput()" onblur="fecharLista()">
            <div class="autocomplete-list" id="autocomplete-list" style="display:none"></div>
          </div>
        </div>

        <div class="form-grid three" style="margin-bottom:12px">
          <div class="field">
            <label>Cor</label>
            <input type="text" id="f-cor" placeholder="Ex: Preto/branco">
          </div>
          <div class="field">
            <label>Número</label>
            <input type="number" id="f-numero" placeholder="Ex: 42" min="30" max="50" oninput="verificarDuplicata()">
          </div>
          <div class="field">
            <label>Quantidade</label>
            <input type="number" id="f-qtd" placeholder="Ex: 3" min="1">
          </div>
        </div>

        <div class="form-grid">
          <div class="field">
            <label>Preço de custo (R$)</label>
            <input type="number" id="f-custo" placeholder="0,00" min="0" step="0.01">
          </div>
          <div class="field">
            <label>Preço de venda (R$)</label>
            <input type="number" id="f-venda" placeholder="0,00" min="0" step="0.01">
          </div>
        </div>

        <div id="aviso-duplicata" class="aviso-duplicata" style="display:none">
          Produto já existe no estoque. A quantidade informada será <strong>somada</strong> ao estoque atual.
        </div>

        <div class="actions">
          <button class="btn" onclick="clearForm()">Limpar</button>
          <button class="btn primary" onclick="cadastrarProduto()">Salvar produto</button>
        </div>
      </div>
    </div>

    <!-- VENDA -->
    <div id="tab-venda" class="section">
      <div class="card">
        <div class="section-title">Nova venda</div>
        <div id="msg-venda" class="msg"></div>

        <div class="form-grid" style="margin-bottom:16px">
          <div class="field">
            <label>Produto</label>
            <select id="v-produto"><option value="">Selecionar...</option></select>
          </div>
          <div class="field">
            <label>Quantidade</label>
            <input type="number" id="v-qtd" value="1" min="1">
          </div>
        </div>

        <div class="venda-item venda-item-header" id="itens-header" style="display:none">
          <span>Produto</span><span>Qtd</span><span>Sugerido</span><span>Vendido</span><span></span>
        </div>
        <div id="itens-lista"></div>

        <div style="margin-bottom:16px">
          <button class="btn full-btn" onclick="adicionarItem()">+ Adicionar item</button>
        </div>

        <div class="field" style="margin-bottom:12px">
          <label>Forma de pagamento</label>
          <select id="v-pagamento">
            <option value="">Selecionar...</option>
            <option>Dinheiro</option>
            <option>Pix</option>
            <option>Cartão de débito</option>
            <option>Cartão de crédito</option>
            <option>Fiado</option>
          </select>
        </div>

        <div class="total-box">
          <span class="total-label">Total da venda</span>
          <span class="total-val" id="v-total">R$ 0,00</span>
        </div>

        <div class="actions">
          <button class="btn" onclick="limparVenda()">Cancelar</button>
          <button class="btn primary" onclick="registrarVenda()">Confirmar venda</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
